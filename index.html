<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>英単語シャッター</title>
  <link rel="stylesheet" href="/style.css?v=1.9.0" />
</head>
<body>
  <div class="bg-shards" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <header class="hero-shell">
    <div class="hero-card">
      <div class="hero-copy">
        <p class="eyebrow">Vocabulary Study App</p>
        <h1>英単語シャッター</h1>
      </div>
      <div class="hero-actions">
        <button id="openStatsBtn" class="ghost-btn">学習状況を見る</button>
      </div>
    </div>
  </header>

  <main class="layout">
    <section id="menuScreen" class="card menu-card">
      <div class="menu-title-row">
        <h2>学習メニュー</h2>
        <button id="openModeBtn" class="ghost-btn small">学習の仕方</button>
      </div>
      <button id="openBookDialogBtn" class="selected-book-card" type="button">
        <div id="currentBookThumbnail" class="selected-book-thumbnail no-image"><span>No Image</span></div>
        <div class="selected-book-copy">
          <span>選択中の教材</span>
          <strong id="currentBookName">基本英単語</strong>
          <small id="currentBookMeta">―</small>
        </div>
        <span class="selected-book-action">教材を選択</span>
      </button>
      <div class="controls range-controls">
        <label>
          <span>Unit</span>
          <select id="unitSelect"></select>
        </label>
        <label>
          <span>Part</span>
          <select id="partSelect"></select>
        </label>
      </div>
      <div class="study-method-summary">
        <span>現在の学習の仕方</span>
        <strong id="modeSummary">通常学習・シャッフル・10単語・20秒</strong>
      </div>
      <div id="unitInfo" class="unit-info"></div>
      <p id="startMessage" class="start-message" aria-live="polite"></p>
      <button id="startBtn" class="primary-btn">スタート</button>
    </section>

    <section id="quizScreen" class="card quiz-card hidden">
      <div class="quiz-top">
        <button id="backBtn" class="ghost-btn small">メニューへ</button>
        <div class="progress-wrap"><div id="progressBar"></div></div>
        <p id="progressText">1 / 10</p>
        <div class="timer-pill"><span>残り</span><b id="timerText">20</b><span>秒</span></div>
      </div>
      <div class="timer-bar"><div id="timerBar"></div></div>

      <div id="wordStage" class="word-stage">
        <div class="glass-cracks crack-a"></div>
        <div class="glass-cracks crack-b"></div>
        <div class="glass-cracks crack-c"></div>
        <div class="glass-cracks crack-d"></div>
        <div class="impact-point" aria-hidden="true"></div>
        <h2 id="wordText" class="word">word</h2>
        <div id="shatterLayer" class="shatter-layer" aria-hidden="true"></div>
      </div>

      <p id="questionHint" class="hint">正しい意味をすべて選んでください。</p>
      <div id="choices" class="choices"></div>
      <p id="feedback" class="feedback"></p>
      <div class="quiz-actions">
        <button id="checkBtn" class="primary-btn">答え合わせ</button>
        <button id="nextBtn" class="primary-btn hidden">次へ</button>
      </div>
    </section>

    <section id="resultScreen" class="card result-card hidden">
      <h2>結果</h2>
      <p id="scoreText" class="score"></p>
      <p class="result-note">結果は自動で保存され、学習状況に反映されます。</p>
      <button id="retryBtn" class="primary-btn">もう一度学習する</button>
    </section>
  </main>

  <dialog id="bookDialog" class="book-dialog">
    <div class="dialog-head">
      <div>
        <h2>教材を選択</h2>
        <p class="dialog-subtitle">学習する教材を選んでください。</p>
      </div>
      <button id="closeBookDialogBtn" class="icon-btn" aria-label="閉じる">×</button>
    </div>
    <label class="book-search-field">
      <span>教材を検索</span>
      <input id="bookSearchInput" type="search" placeholder="教材名を入力" autocomplete="off" />
    </label>
    <div id="bookGrid" class="book-grid"></div>
    <p id="bookEmptyMessage" class="book-empty-message hidden">該当する教材がありません。</p>
  </dialog>

  <dialog id="modeDialog" class="mode-dialog">
    <div class="dialog-head">
      <h2>学習の仕方</h2>
      <button id="closeModeBtn" class="icon-btn" aria-label="閉じる">×</button>
    </div>

    <section class="mode-section">
      <h3>出題方向</h3>
      <div class="mode-options compact-options two-columns">
        <label class="mode-option">
          <input type="radio" name="questionDirection" value="enToJa" />
          <div><strong>英 → 日</strong><p>英単語を見て、日本語の意味を選びます。</p></div>
        </label>
        <label class="mode-option">
          <input type="radio" name="questionDirection" value="jaToEn" />
          <div><strong>日 → 英</strong><p>日本語の意味を見て、英単語を選びます。</p></div>
        </label>
      </div>
    </section>

    <section class="mode-section">
      <h3>学習する単語</h3>
      <div class="mode-options compact-options">
        <label class="mode-option">
          <input type="radio" name="studyTarget" value="normal" />
          <div><strong>通常学習</strong><p>選択したPartを学習します。</p></div>
        </label>
        <label class="mode-option">
          <input type="radio" name="studyTarget" value="weak" />
          <div><strong>苦手な単語</strong><p>選択したPart内の「苦手」な単語を学習します。</p></div>
        </label>
        <label class="mode-option">
          <input type="radio" name="studyTarget" value="wrong" />
          <div><strong>間違えた単語</strong><p>選択したPart内で、一度でも間違えた単語を学習します。</p></div>
        </label>
      </div>
    </section>

    <section class="mode-section">
      <h3>出題順</h3>
      <div class="mode-options compact-options two-columns">
        <label class="mode-option">
          <input type="radio" name="orderMode" value="sequential" />
          <div><strong>順番通り</strong><p>単語の並び順で出題します。</p></div>
        </label>
        <label class="mode-option">
          <input type="radio" name="orderMode" value="shuffle" />
          <div><strong>シャッフル</strong><p>単語をランダムに出題します。</p></div>
        </label>
      </div>
    </section>

    <section class="mode-section setting-grid">
      <label>
        <span>1回に学習する数</span>
        <select id="modeCountSelect">
          <option value="10">10単語</option>
          <option value="15">15単語</option>
          <option value="20">20単語</option>
          <option value="25">25単語</option>
          <option value="30">30単語</option>
        </select>
      </label>
      <label>
        <span>制限時間</span>
        <select id="modeTimeSelect">
          <option value="10">10秒</option>
          <option value="15">15秒</option>
          <option value="20">20秒</option>
          <option value="25">25秒</option>
          <option value="30">30秒</option>
        </select>
      </label>
    </section>

    <button id="saveModeBtn" class="primary-btn">この設定にする</button>
  </dialog>

  <dialog id="statsDialog" class="stats-dialog">
    <div class="dialog-head">
      <h2>学習状況</h2>
      <button id="closeStatsBtn" class="icon-btn" aria-label="閉じる">×</button>
    </div>
    <div class="stats-toolbar">
      <label>
        <span>表示範囲</span>
        <select id="statsScopeSelect">
          <option value="all">全体</option>
        </select>
      </label>
      <p id="statsScopeNote" class="stats-scope-note"></p>
    </div>
    <div class="stats-grid">
      <section class="stat-card">
        <h3 id="learnedHeading">全体の学習した量</h3>
        <div class="pie-wrap">
          <div id="pieChart" class="pie-chart"><span id="piePercent">0%</span></div>
        </div>
        <div class="legend"><span class="learned"></span>学習済み <b id="learnedText">0%</b></div>
        <div class="legend"><span class="unlearned"></span>未学習 <b id="unlearnedText">100%</b></div>
      </section>
      <section class="stat-card">
        <h3 id="masteryHeading">全体の定着具合</h3>
        <div id="barChart" class="bar-chart"></div>
      </section>
    </div>
    <button id="resetBtn" class="danger-btn">学習記録をリセット</button>
  </dialog>

  <script src="/words.js?v=1.9.0"></script>
  <script src="/app.js?v=1.9.0"></script>
</body>
</html>
